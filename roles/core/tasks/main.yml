---
# tasks file for core
- name: Ensure monitoring directory exists
  ansible.builtin.file:
    state: directory
    path: /opt/monitoring
    owner: rm
    group: rm
    mode: "0755"
    recurse: true

- name: Install python3 modules
  ansible.builtin.apt:
    name:
      - python3-pip
      - python3-docker
    state: present
    update_cache: true
  become: true

- name: Create Docker "monitoring-layer" network
  community.docker.docker_network:
    name: monitoring-layer
    driver: bridge
    ipam_config:
      - subnet: "172.18.0.0/24"

- name: Copy docker-compose.yaml and .env to root directory
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "/opt/monitoring/{{ item }}"
    owner: rm
    group: rm
    mode: "0755"
  loop:
    - docker-compose.yaml
    - .env

- name: Prepare Alloy
  ansible.builtin.import_tasks: alloy.yml

- name: Prepare Prometheus
  ansible.builtin.import_tasks: prometheus.yml

- name: Prepare Grafana
  ansible.builtin.import_tasks: grafana.yml

- name: Prepare Loki and MinIO
  ansible.builtin.import_tasks: loki.yml

- name: Prepare Blackbox Exporter
  ansible.builtin.import_tasks: blackbox.yml

- name: Create and start services
  community.docker.docker_compose_v2:
    project_src: /opt/monitoring
    state: present
  register: core_output

- name: Show results
  ansible.builtin.debug:
    var: core_output

services:
  node-exporter:
    image: prom/node-exporter:v1.10.0
    container_name: node-exporter
    restart: unless-stopped
    
    network_mode: host
    pid: host
    userns_mode: host

    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 128M

    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
      - '--web.listen-address=172.17.0.1:9100'     

  prometheus:
    image: prom/prometheus:v3.9.0
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
      - ./prometheus/test-connection/rules.yml:/etc/prometheus/rules.yml
        #- ./telegram-alerting-config/alerting_rules.yml:/etc/prometheus/alerting_rules.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=5GB'
      - '--web.enable-lifecycle'
      - '--web.enable-remote-write-receiver'
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - monitoring-layer
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 256M

  grafana:
    image: grafana/grafana:12.3.1
    container_name: grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
        #- GF_SERVER_ROOT_URL=https://my-monitoring.com
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - monitoring-layer
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 128M

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.0
    container_name: cadvisor
    restart: unless-stopped

    userns_mode: host

    expose:
      - "8081"
    command:
      - -port=8081

    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:8081/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M

    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    privileged: true
    networks:
      - monitoring-layer

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.28.0
    container_name: blackbox-exporter
    restart: unless-stopped
    
    expose:
      - "9115"
    volumes:
      - ./blackbox/blackbox.yml:/config/blackbox.yml
    command:
      - '--config.file=/config/blackbox.yml'

    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M

    networks:
      - monitoring-layer

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    
    expose:
      - "9000"
      - "9001"
    ports:
      - "127.0.0.1:9001:9001"
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 10s

    volumes:
      - minio_data:/data
    networks:
      - monitoring-layer

    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 256M

  minio-create-bucket:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb --ignore-existing myminio/loki-data;
      exit 0;
      "

    networks:
      - monitoring-layer

  loki-init:
    image: alpine:latest
    volumes:
      - loki_wal:/loki
    command: chown -R 10001:10001 /loki

  loki:
    image: grafana/loki:3.6
    container_name: loki
    restart: unless-stopped

    volumes:
      - loki_wal:/loki/wal
      - ./loki/loki.yaml:/etc/loki/local-config.yaml
    ports:
      - "127.0.0.1:3100:3100"
    depends_on:
      loki-init:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
    networks:
      - monitoring-layer

    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 256M

  alloy:
    image: grafana/alloy:v1.12.2
    container_name: alloy
    restart: unless-stopped

    userns_mode: host
    
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "127.0.0.1:12345:12345"
    command: 
      - 'run'
      - '--disable-reporting'
      - '--server.http.listen-addr=0.0.0.0:12345'
      - '--storage.path=/var/lib/alloy/data'
      - '/etc/alloy/config.alloy'
    networks:
      - monitoring-layer
    depends_on:
      - loki
      - prometheus
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 256M


        
        #  nginx-auth:
        # image: nginx:stable-alpine
        # container_name: nginx-auth
        #ports:
        #- "9090:80"
        #volumes:
        #- ./nginx_auth.conf:/etc/nginx/conf.d/default.conf:ro
        #- ./.htpasswd:/etc/nginx/.htpasswd:ro
        #depends_on:
        #- prometheus

volumes:
  grafana_data:
  prometheus_data:
  alertmanager_data:
  minio_data:
  loki_wal:

networks:
  monitoring-layer:
    external: true

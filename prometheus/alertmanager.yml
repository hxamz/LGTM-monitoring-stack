templates:
  - /etc/alertmanager/telegram.tmpl

route:
  group_by: ['alertname']
  group_wait: 5s
  group_interval: 10s
  repeat_interval: 1h
  
  receiver: 'telegram'

receivers:
  - name: 'telegram'
    telegram_configs:
    - bot_token_file: /etc/alertmanager/secrets/telegram_token
      chat_id: -5118013118
      parse_mode: 'HTML'
      message: '{{ template "telegram.message" . }}'
